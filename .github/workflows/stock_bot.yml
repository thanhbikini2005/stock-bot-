name: Stock Bot

on:
  schedule:
    # ICT = UTC+7, GitHub cron dùng UTC
    # 09:15 ICT = 02:15 UTC
    - cron: "15 2 * * 1-5"
    # 11:30 ICT = 04:30 UTC
    - cron: "30 4 * * 1-5"
    # 14:10 ICT = 07:10 UTC
    - cron: "10 7 * * 1-5"
    # 15:30 ICT = 08:30 UTC
    - cron: "30 8 * * 1-5"
    # Chủ nhật: 09:15 + 14:10 ICT
    - cron: "15 2 * * 0"
    - cron: "10 7 * * 0"

  workflow_dispatch:
    inputs:
      watchlist:
        description: "Danh sach ma (VD: VNM,HPG,FPT)"
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cai dependencies
        run: pip install -r requirements.txt

      - name: Chay quet tin hieu
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          WATCHLIST: ${{ github.event.inputs.watchlist || vars.WATCHLIST || 'VNM,HPG,VIC,VHM,FPT,MWG,TCB,VCB,BID,CTG' }}
        run: python stock_analyzer.py
